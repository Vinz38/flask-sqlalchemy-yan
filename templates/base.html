<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <title>{{ title }}</title>
  </head>
  <body>
    <!-- Шапка -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <a class="navbar-brand" href="#">Миссия Колонизация Марса</a>

      <div class="ml-auto d-flex align-items-center">
        {% if current_user.is_authenticated %}
          <span class="mr-3">Пользователь: <a href="{{ url_for('auth.logout') }}">{{ current_user.name }}</a></span>
        {% else %}
          <a href="{{ url_for('auth.login') }}" class="btn btn-primary mr-2">Вход</a>
          <a href="{{ url_for('reg.reqister') }}" class="btn btn-success">Регистрация</a>
        {% endif %}
      </div>
    </nav>

    <div class="text-center mt-3">
      <img src="{{ url_for('static', filename='img/MARS-2-7.png') }}" alt="Эмблема миссии" class="emblem" />
      <h4>И на Марсе будут яблони цвести</h4>
    </div>

    <!-- Контент страницы -->
    <main role="main" class="container">{% block content %}{% endblock %}</main>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
